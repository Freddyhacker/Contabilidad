<script>
/* ============================================
   Modelo de datos: "cells" — cada carácter que se puede insertar o
   borrar en cualquier posición mediante un CURSOR de texto real (como en
   un input normal), no un bloque fijo por número.
   - dígitos/punto: una celda por carácter (editable de a uno)
   - operadores/funciones/paréntesis/pi: una celda atómica (no se parte)
   ============================================ */
let cells = [];
let cursor = 0; // posición del cursor (0..cells.length): dónde se inserta lo próximo que se escriba
let deg = true; // grados por defecto (más intuitivo que radianes)
let memory = 0;

const dispEl = document.getElementById("calc-display");

function toRad(x) { return deg ? x * Math.PI / 180 : x; }
const sin = x => Math.sin(toRad(x));
const cos = x => Math.cos(toRad(x));
const tan = x => Math.tan(toRad(x));
const log = x => Math.log10(x);
const ln = x => Math.log(x);
const sqrt = x => Math.sqrt(x);
const pi = Math.PI;

function isDigitChar(ch) { return /^[0-9.]$/.test(ch); }

// El eval usa siempre paréntesis reales; [ ] { } son solo visuales para
// que el usuario distinga niveles de jerarquía a simple vista.
function exprString() {
  return cells.map(c => c.op).join("");
}

function insertAtCursor(op, label) {
  cells.splice(cursor, 0, { op, label, kind: isDigitChar(op) ? "digit" : "atom" });
  cursor++;
  render();
}

function backspaceAtCursor() {
  if (cursor === 0) return;
  cells.splice(cursor - 1, 1);
  cursor--;
  render();
}

function deleteForward() {
  if (cursor >= cells.length) return;
  cells.splice(cursor, 1);
  render();
}

function moveCursor(delta) {
  cursor = Math.max(0, Math.min(cells.length, cursor + delta));
  render();
}

// Agrupa corridas de dígitos consecutivos en "números", para poder
// detectar patrones número/número (fracción) y número^número (potencia)
// igual que antes, pero ahora sobre el arreglo de celdas individuales.
function groupCells() {
  const groups = [];
  let i = 0;
  while (i < cells.length) {
    if (cells[i].kind === "digit") {
      const start = i;
      while (i < cells.length && cells[i].kind === "digit") i++;
      groups.push({ type: "num", start, end: i });
    } else {
      groups.push({ type: "atom", start: i, end: i + 1 });
      i++;
    }
  }
  return groups;
}

// Detecta jerarquía de paréntesis automáticamente: el nivel 1 (el más
// interno) se ve "(" ")", nivel 2 "[" "]", nivel 3 "{" "}", y si hay más
// niveles se vuelve a repetir el ciclo. Para EVALUAR siempre son
// paréntesis normales — esto es solo visual.
const BRACKET_OPEN = ["(", "[", "{"];
const BRACKET_CLOSE = [")", "]", "}"];
function computeBracketLevels() {
  const levels = new Array(cells.length).fill(null);
  let depth = 0;
  cells.forEach((c, i) => {
    if (c.op === "(") { depth++; levels[i] = depth; }
    else if (c.op === ")") { levels[i] = depth; depth = Math.max(0, depth - 1); }
  });
  return levels;
}
function bracketChar(op, level) {
  const idx = ((level || 1) - 1) % 3;
  return op === "(" ? BRACKET_OPEN[idx] : BRACKET_CLOSE[idx];
}

// Dibuja los dígitos de start a end (excluyente), insertando el cursor
// parpadeante en cualquier hueco donde caiga (antes, en medio o después).
function renderDigits(start, end) {
  let html = "";
  for (let i = start; i <= end; i++) {
    if (i === cursor) html += `<span class="calc-cursor"></span>`;
    if (i < end) html += `<span class="calc-cell" data-i="${i}">${cells[i].label}</span>`;
  }
  return html;
}

function renderAtom(g, levels) {
  const cell = cells[g.start];
  const label = (cell.op === "(" || cell.op === ")") ? bracketChar(cell.op, levels[g.start]) : cell.label;
  let html = "";
  if (cursor === g.start) html += `<span class="calc-cursor"></span>`;
  html += `<span class="calc-cell" data-i="${g.start}">${label}</span>`;
  return html;
}

function renderHTML() {
  if (!cells.length) return `0<span class="calc-cursor"></span>`;
  const groups = groupCells();
  const levels = computeBracketLevels();
  let html = "";
  let gi = 0;
  while (gi < groups.length) {
    const g = groups[gi], g1 = groups[gi + 1], g2 = groups[gi + 2];
    if (g.type === "num" && g1 && g1.type === "atom" && cells[g1.start].op === "/" && g2 && g2.type === "num") {
      html += `<span class="frac"><span class="num">${renderDigits(g.start, g.end)}</span><span class="den">${renderDigits(g2.start, g2.end)}</span></span>`;
      gi += 3; continue;
    }
    if (g.type === "num" && g1 && g1.type === "atom" && cells[g1.start].op === "^" && g2 && g2.type === "num") {
      html += `${renderDigits(g.start, g.end)}<sup>${renderDigits(g2.start, g2.end)}</sup>`;
      gi += 3; continue;
    }
    if (g.type === "num") { html += renderDigits(g.start, g.end); gi++; continue; }
    html += renderAtom(g, levels);
    gi++;
  }
  if (cursor === cells.length) html += `<span class="calc-cursor"></span>`;
  return html;
}

function render() {
  dispEl.innerHTML = renderHTML();
  dispEl.scrollLeft = dispEl.scrollWidth;
  dispEl.querySelectorAll(".calc-cell").forEach(el => {
    el.addEventListener("click", () => { cursor = parseInt(el.dataset.i) + 1; render(); });
  });
}
dispEl.addEventListener("click", (e) => {
  if (e.target === dispEl) { cursor = cells.length; render(); }
});

function evaluate() {
  if (!cells.length) return;
  try {
    const safe = exprString().replace(/\^/g, "**");
    const result = Function("sin", "cos", "tan", "log", "ln", "sqrt", "pi", `"use strict"; return (${safe})`)(sin, cos, tan, log, ln, sqrt, pi);
    if (typeof result !== "number" || !isFinite(result)) throw new Error("resultado inválido");
    // Antes se recortaba siempre a 10 decimales. Un número de punto
    // flotante (como usa JS y prácticamente cualquier calculadora) solo
    // puede representar con exactitud unos 15-17 dígitos significativos
    // en total — así que en vez de recortar de más, se conservan todos
    // los que realmente son confiables.
    const rounded = parseFloat(result.toPrecision(15));
    cells = String(rounded).split("").map(ch => ({ op: ch, label: ch, kind: isDigitChar(ch) ? "digit" : "atom" }));
    cursor = cells.length;
    render();
  } catch (err) {
    dispEl.textContent = "Error";
    cells = []; cursor = 0;
  }
}

// ---------- Botones científicos ----------
document.getElementById("calc-sci").addEventListener("click", (e) => {
  const btn = e.target.closest("button");
  if (!btn) return;
  if (btn.dataset.op === "deg") {
    deg = !deg;
    btn.classList.toggle("active-toggle", deg);
    btn.textContent = deg ? "DEG" : "RAD";
    return;
  }
  if (btn.dataset.action === "mem-add") { evaluate(); memory += parseFloat(exprString()) || 0; return; }
  if (btn.dataset.action === "mem-recall") { String(memory).split("").forEach(ch => insertAtCursor(ch, ch)); return; }
  if (btn.dataset.action === "clear-mem") { memory = 0; return; }
  if (btn.dataset.action === "open-save") {
    if (!cells.length) return;
    document.getElementById("calc-save-modal").style.display = "flex";
    document.getElementById("calc-save-name").focus();
    return;
  }
  if (btn.dataset.fn) { insertAtCursor(btn.dataset.fn, btn.textContent + "("); return; }
  if (btn.dataset.op === "pi") { insertAtCursor("pi", "π"); return; }
  if (btn.dataset.op) { insertAtCursor(btn.dataset.op, btn.textContent); return; }
});

// ---------- Botones básicos ----------
document.getElementById("calc-basic").addEventListener("click", (e) => {
  const btn = e.target.closest("button");
  if (!btn) return;
  if (btn.dataset.action === "clear") { cells = []; cursor = 0; render(); return; }
  if (btn.dataset.action === "back") { backspaceAtCursor(); return; }
  if (btn.dataset.action === "equals") { evaluate(); return; }
  if (btn.dataset.action === "open-list") {
    renderFrequent();
    document.getElementById("calc-list-modal").style.display = "flex";
    return;
  }
  if (btn.dataset.op) { insertAtCursor(btn.dataset.op, btn.textContent); return; }
});

// ---------- Teclado físico (PC): fila de números Y numpad, flechas, etc ----------
const KEY_OP = {
  "+": ["+", "+"], "-": ["-", "−"], "*": ["*", "×"], "/": ["/", "÷"], "^": ["^", "^"],
  "(": ["(", "("], ")": [")", ")"],
};
window.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT") return; // no interferir al escribir el nombre de "Guardar"
  if (isDigitChar(e.key)) { e.preventDefault(); insertAtCursor(e.key, e.key); return; }
  if (KEY_OP[e.key]) { e.preventDefault(); insertAtCursor(...KEY_OP[e.key]); return; }
  if (e.key === "Enter" || e.key === "=") { e.preventDefault(); evaluate(); return; }
  if (e.key === "Backspace") { e.preventDefault(); backspaceAtCursor(); return; }
  if (e.key === "Delete") { e.preventDefault(); deleteForward(); return; }
  if (e.key === "ArrowLeft") { e.preventDefault(); moveCursor(-1); return; }
  if (e.key === "ArrowRight") { e.preventDefault(); moveCursor(1); return; }
  if (e.key === "Escape") { e.preventDefault(); cells = []; cursor = 0; render(); return; }
});

// ---------- Operaciones frecuentes (sincronizadas: viven en tu usuario) ----------
let currentUsername = null;

async function getFrequent() {
  if (!currentUsername) return [];
  const list = await Auth.getUserCalcFrequent(currentUsername);
  return list || [];
}
async function saveFrequent(list) {
  if (!currentUsername) return;
  await Auth.saveUserCalcFrequent(currentUsername, list);
}

async function renderFrequent() {
  const list = await getFrequent();
  const wrap = document.getElementById("calc-frequent");
  wrap.innerHTML = list.length ? "" : '<span style="color:var(--text-muted);font-size:.82rem">Aún no guardas ninguna</span>';
  list.forEach((op, i) => {
    if (!op.cells && op.tokens) op.cells = op.tokens; // compatibilidad con formato anterior
    const chip = document.createElement("div");
    chip.className = "calc-freq-chip";
    chip.innerHTML = `<span>${op.name}</span><button data-i="${i}" title="Eliminar">✕</button>`;
    chip.querySelector("span").addEventListener("click", () => {
      // se insertan las celdas TAL CUAL se guardaron, en la posición del
      // cursor — cada número sigue siendo editable después
      op.cells.forEach(c => { cells.splice(cursor, 0, { ...c }); cursor++; });
      render();
      document.getElementById("calc-list-modal").style.display = "none";
    });
    chip.querySelector("button").addEventListener("click", async (e) => {
      e.stopPropagation();
      const l = await getFrequent(); l.splice(i, 1); await saveFrequent(l); renderFrequent();
    });
    wrap.appendChild(chip);
  });
}

document.getElementById("calc-save-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  if (!cells.length) return;
  const nameEl = document.getElementById("calc-save-name");
  const list = await getFrequent();
  list.push({ name: nameEl.value.trim(), cells: cells.map(c => ({ ...c })) });
  await saveFrequent(list);
  nameEl.value = "";
  document.getElementById("calc-save-modal").style.display = "none";
});
document.getElementById("calc-save-cancel").addEventListener("click", () => {
  document.getElementById("calc-save-modal").style.display = "none";
});
document.getElementById("calc-list-close").addEventListener("click", () => {
  document.getElementById("calc-list-modal").style.display = "none";
});

(async () => {
  const session = await guardPage();
  if (!session) return;
  currentUsername = session.username;
  render();
})();
</script>
