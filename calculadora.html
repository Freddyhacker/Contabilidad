        <button data-fn="cos(">cos</button>
        <button data-fn="tan(">tan</button>
        <button data-action="clear-mem">MC</button>

        <button data-fn="log(">log</button>
        <button data-fn="ln(">ln</button>
        <button data-fn="sqrt(">√</button>
        <button data-op="^">x^y</button>

        <button data-op=")">)</button>
        <button data-op="pi">π</button>
        <button data-op="%">%</button>
        <button data-action="mem-add">M+</button>

        <button data-action="clear">C</button>
        <button data-action="back">⌫</button>
        <button data-op="/">÷</button>

        <button data-op="7">7</button>
        <button data-op="8">8</button>
        <button data-op="9">9</button>
        <button data-op="-">−</button>

        <button data-op="4">4</button>
        <button data-op="5">5</button>
        <button data-op="6">6</button>
        <button data-op="+">+</button>

        <button data-op="1">1</button>
        <button data-op="2">2</button>
        <button data-op="3">3</button>
        <button data-action="equals" class="calc-eq" style="grid-row: span 2">=</button>

        <button data-op="0" style="grid-column:span 2">0</button>
        <button data-op=".">.</button>
      </div>
    </div>

<script>
let expr = "";      // lo que se va construyendo (con Math.sin( etc.)
let displayExpr = ""; // lo mismo pero legible para el usuario
let deg = true;      // grados por defecto (más intuitivo que radianes)
let memory = 0;

const exprEl = document.getElementById("calc-expr");
const dispEl = document.getElementById("calc-display");

function toRad(x) { return deg ? x * Math.PI / 180 : x; }
// Envolturas que respetan grados/radianes para las funciones trigonométricas
const sin = x => Math.sin(toRad(x));
const cos = x => Math.cos(toRad(x));
const tan = x => Math.tan(toRad(x));
const log = x => Math.log10(x);
const ln = x => Math.log(x);
const sqrt = x => Math.sqrt(x);
const pi = Math.PI;

function render() {
  exprEl.textContent = displayExpr || "";
  dispEl.textContent = expr === "" ? "0" : displayExpr;
}

function append(op, label) {
  expr += op;
  displayExpr += (label ?? op);
  render();
}

function evaluate() {
  if (!expr) return;
  try {
    // "^" es potencia: se traduce a ** antes de evaluar
    const safe = expr.replace(/\^/g, "**");
    // eslint-disable-next-line no-new-func
    const result = Function("sin", "cos", "tan", "log", "ln", "sqrt", "pi", `"use strict"; return (${safe})`)(sin, cos, tan, log, ln, sqrt, pi);
    if (typeof result !== "number" || !isFinite(result)) throw new Error("resultado inválido");
    const rounded = Math.round(result * 1e10) / 1e10;
    expr = String(rounded);
    displayExpr = String(rounded);
    render();
  } catch (err) {
    dispEl.textContent = "Error";
    expr = "";
    displayExpr = "";
  }
}

document.getElementById("calc-sci").addEventListener("click", (e) => {
  const btn = e.target.closest("button");
  if (!btn) return;
  if (btn.dataset.op === "deg") {
    deg = !deg;
    btn.classList.toggle("active-toggle", deg);
    btn.textContent = deg ? "DEG" : "RAD";
    return;
  }
  if (btn.dataset.action === "mem-add") { evaluate(); memory += parseFloat(expr) || 0; return; }
  if (btn.dataset.action === "mem-recall") { append(String(memory)); return; }
  if (btn.dataset.action === "clear-mem") { memory = 0; return; }
  if (btn.dataset.fn) { append(btn.dataset.fn); return; }
  if (btn.dataset.op === "pi") { append("pi", "π"); return; }
  if (btn.dataset.op) { append(btn.dataset.op); return; }
});

document.getElementById("calc-basic").addEventListener("click", (e) => {
  const btn = e.target.closest("button");
  if (!btn) return;
  if (btn.dataset.action === "clear") { expr = ""; displayExpr = ""; render(); return; }
  if (btn.dataset.action === "back") { expr = expr.slice(0, -1); displayExpr = displayExpr.slice(0, -1); render(); return; }
  if (btn.dataset.action === "equals") { evaluate(); return; }
  if (btn.dataset.op) { append(btn.dataset.op); return; }
});

// ---------- Operaciones frecuentes (guardadas en este dispositivo) ----------
const FREQ_KEY = "calc-frequent-ops";
function getFrequent() {
  try { return JSON.parse(localStorage.getItem(FREQ_KEY)) || []; } catch { return []; }
}
function saveFrequent(list) { localStorage.setItem(FREQ_KEY, JSON.stringify(list)); }

function renderFrequent() {
  const list = getFrequent();
  const wrap = document.getElementById("calc-frequent");
  wrap.innerHTML = list.length ? "" : '<span style="color:var(--text-muted);font-size:.82rem">Aún no guardas ninguna</span>';
  list.forEach((op, i) => {
    const chip = document.createElement("div");
    chip.className = "calc-chip";
    chip.innerHTML = `<span>${op.name}</span><button data-i="${i}" title="Eliminar">✕</button>`;
    chip.querySelector("span").addEventListener("click", () => { append(op.expr, op.name); });
    chip.querySelector("button").addEventListener("click", (e) => {
      e.stopPropagation();
      const l = getFrequent(); l.splice(i, 1); saveFrequent(l); renderFrequent();
    });
    wrap.appendChild(chip);
  });
}

document.getElementById("calc-save-form").addEventListener("submit", (e) => {
  e.preventDefault();
  if (!expr) return;
  const nameEl = document.getElementById("calc-save-name");
  const list = getFrequent();
  list.push({ name: nameEl.value.trim(), expr });
  saveFrequent(list);
  nameEl.value = "";
  renderFrequent();
});

(async () => {
  const session = await guardPage();
  if (!session) return;
  render();
  renderFrequent();
})();
</script>
