<script>
// Cada tecla presionada se guarda como un "token" con dos formas:
//  - op: lo que se evalúa (ej. "sqrt(", "/", "^")
//  - label: lo que se ve en pantalla (ej. "√(", "÷", "^") — así nunca se
//    desincroniza lo que ves de lo que se calcula, y Borrar quita un
//    símbolo completo a la vez, no un carácter suelto.
let tokens = [];
let deg = true; // grados por defecto (más intuitivo que radianes)
let memory = 0;

const exprEl = document.getElementById("calc-expr");
const dispEl = document.getElementById("calc-display");

function toRad(x) { return deg ? x * Math.PI / 180 : x; }
const sin = x => Math.sin(toRad(x));
const cos = x => Math.cos(toRad(x));
const tan = x => Math.tan(toRad(x));
const log = x => Math.log10(x);
const ln = x => Math.log(x);
const sqrt = x => Math.sqrt(x);
const pi = Math.PI;

function tokensToLabel(toks) { return toks.map(t => t.label).join(""); }
function exprString() { return tokens.map(t => t.op).join(""); }
function labelString() { return tokensToLabel(tokens); }

// Convierte "12÷5" en una fracción de dos pisos, y "2^3" en un exponente
// elevado — así se ve "multinivel" en vez de puro texto en línea.
function prettyHTML(s) {
  let html = s
    .replace(/(\d+\.?\d*)÷(\d+\.?\d*)/g, '<span class="frac"><span class="num">$1</span><span class="den">$2</span></span>')
    .replace(/(\d+\.?\d*)÷(?!\d)/g, '<span class="frac"><span class="num">$1</span><span class="den">&nbsp;</span></span>')
    .replace(/(\d+\.?\d*)\^(\d+\.?\d*)/g, '$1<sup>$2</sup>');
  return html || "0";
}

function render() {
  exprEl.textContent = labelString();
  dispEl.innerHTML = tokens.length ? prettyHTML(labelString()) : "0";
  exprEl.scrollLeft = exprEl.scrollWidth;
  dispEl.scrollLeft = dispEl.scrollWidth;
}

function pushToken(op, label) {
  // los dígitos y el punto se van pegando al número que ya se estaba
  // escribiendo, en vez de crear un token nuevo por cada tecla
  const isDigit = /^[0-9.]$/.test(op);
  const last = tokens[tokens.length - 1];
  if (isDigit && last && last.type === "num") {
    last.op += op; last.label += label ?? op;
  } else {
    tokens.push({ type: isDigit ? "num" : "op", op, label: label ?? op });
  }
  render();
}

function evaluate() {
  if (!tokens.length) return;
  try {
    const safe = exprString().replace(/\^/g, "**");
    const result = Function("sin", "cos", "tan", "log", "ln", "sqrt", "pi", `"use strict"; return (${safe})`)(sin, cos, tan, log, ln, sqrt, pi);
    if (typeof result !== "number" || !isFinite(result)) throw new Error("resultado inválido");
    const rounded = Math.round(result * 1e10) / 1e10;
    tokens = [{ type: "num", op: String(rounded), label: String(rounded) }];
    render();
  } catch (err) {
    dispEl.textContent = "Error";
    tokens = [];
  }
}

document.getElementById("calc-sci").addEventListener("click", (e) => {
  const btn = e.target.closest("button");
  if (!btn) return;
  if (btn.dataset.op === "deg") {
    deg = !deg;
    btn.classList.toggle("active-toggle", deg);
    btn.textContent = deg ? "DEG" : "RAD";
    return;
  }
  if (btn.dataset.action === "mem-add") { evaluate(); memory += parseFloat(exprString()) || 0; return; }
  if (btn.dataset.action === "mem-recall") { pushToken(String(memory)); return; }
  if (btn.dataset.action === "clear-mem") { memory = 0; return; }
  if (btn.dataset.action === "open-save") {
    if (!tokens.length) return;
    document.getElementById("calc-save-modal").style.display = "flex";
    document.getElementById("calc-save-name").focus();
    return;
  }
  if (btn.dataset.fn) { pushToken(btn.dataset.fn, btn.textContent + "("); return; }
  if (btn.dataset.op === "pi") { pushToken("pi", "π"); return; }
  if (btn.dataset.op) { pushToken(btn.dataset.op, btn.textContent); return; }
});

document.getElementById("calc-basic").addEventListener("click", (e) => {
  const btn = e.target.closest("button");
  if (!btn) return;
  if (btn.dataset.action === "clear") { tokens = []; render(); return; }
  if (btn.dataset.action === "back") {
    const last = tokens[tokens.length - 1];
    if (last && last.type === "num" && last.op.length > 1) {
      last.op = last.op.slice(0, -1);
      last.label = last.label.slice(0, -1);
    } else {
      tokens.pop();
    }
    render();
    return;
  }
  if (btn.dataset.action === "equals") { evaluate(); return; }
  if (btn.dataset.action === "open-list") {
    renderFrequent();
    document.getElementById("calc-list-modal").style.display = "flex";
    return;
  }
  if (btn.dataset.op) { pushToken(btn.dataset.op, btn.textContent); return; }
});

// ---------- Operaciones frecuentes (guardadas en este dispositivo) ----------
const FREQ_KEY = "calc-frequent-ops";
function getFrequent() {
  try { return JSON.parse(localStorage.getItem(FREQ_KEY)) || []; } catch { return []; }
}
function saveFrequent(list) { localStorage.setItem(FREQ_KEY, JSON.stringify(list)); }

function renderFrequent() {
  const list = getFrequent();
  const wrap = document.getElementById("calc-frequent");
  wrap.innerHTML = list.length ? "" : '<span style="color:var(--text-muted);font-size:.82rem">Aún no guardas ninguna</span>';
  list.forEach((op, i) => {
    if (!op.tokens && op.expr) op.tokens = [{ type: "op", op: op.expr, label: op.name }]; // formato viejo
    const chip = document.createElement("div");
    chip.className = "calc-freq-chip";
    chip.innerHTML = `<span>${op.name} <span style="color:var(--text-muted);font-size:.78rem">(${tokensToLabel(op.tokens)})</span></span><button data-i="${i}" title="Eliminar">✕</button>`;
    chip.querySelector("span").addEventListener("click", () => {
      // se insertan los tokens TAL CUAL se guardaron (cada número por su
      // lado), para poder editar cualquiera de ellos después, no como un
      // solo bloque fijo
      op.tokens.forEach(t => tokens.push({ ...t }));
      render();
      document.getElementById("calc-list-modal").style.display = "none";
    });
    chip.querySelector("button").addEventListener("click", (e) => {
      e.stopPropagation();
      const l = getFrequent(); l.splice(i, 1); saveFrequent(l); renderFrequent();
    });
    wrap.appendChild(chip);
  });
}

document.getElementById("calc-save-form").addEventListener("submit", (e) => {
  e.preventDefault();
  if (!tokens.length) return;
  const nameEl = document.getElementById("calc-save-name");
  const list = getFrequent();
  list.push({ name: nameEl.value.trim(), tokens: tokens.map(t => ({ ...t })) });
  saveFrequent(list);
  nameEl.value = "";
  document.getElementById("calc-save-modal").style.display = "none";
});
document.getElementById("calc-save-cancel").addEventListener("click", () => {
  document.getElementById("calc-save-modal").style.display = "none";
});
document.getElementById("calc-list-close").addEventListener("click", () => {
  document.getElementById("calc-list-modal").style.display = "none";
});

(async () => {
  const session = await guardPage();
  if (!session) return;
  render();
})();
</script>
