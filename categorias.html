<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Libro — Categorías</title>
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar-mount"></nav>
  <main class="main">
    <div class="topbar"><div><h1>Categorías</h1><div class="sub">Clasifica tus ingresos y gastos</div></div></div>

    <div class="grid grid-2" style="align-items:start">
      <div class="card">
        <h3>Nueva categoría</h3>
        <form id="cat-form">
          <label for="c-nombre">Nombre</label>
          <input id="c-nombre" required placeholder="Ej. Alimentación">
          <label for="c-tipo">Tipo</label>
          <select id="c-tipo">
            <option value="gasto">Gasto</option>
            <option value="ingreso">Ingreso</option>
          </select>
          <label for="c-color">Color</label>
          <input id="c-color" type="color" value="#7ca982">
          <button class="btn btn-block" type="submit">Agregar categoría</button>
        </form>
      </div>

      <div class="card">
        <h3>Categorías existentes</h3>
        <table id="cat-table">
          <thead><tr><th>Color</th><th>Nombre</th><th>Tipo</th><th></th></tr></thead>
          <tbody></tbody>
        </table>
        <div class="empty-state" id="empty" style="display:none">Aún no hay categorías.</div>
      </div>
    </div>
  </main>
</div>

<script src="js/idb.js"></script>
<script src="js/crypto.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/theme.js"></script>
<script src="js/nav.js"></script>
<script>
function loadCategorias() {
  const cats = DB.all("SELECT * FROM categorias ORDER BY tipo, nombre");
  const tbody = document.querySelector("#cat-table tbody");
  document.getElementById("empty").style.display = cats.length ? "none" : "block";
  tbody.innerHTML = cats.map(c => `
    <tr>
      <td><span style="display:inline-block;width:14px;height:14px;border-radius:4px;background:${c.color}"></span></td>
      <td>${c.nombre}</td>
      <td><span class="badge">${c.tipo}</span></td>
      <td><a href="#" data-id="${c.id}" class="del-link" style="color:var(--accent-danger)">Eliminar</a></td>
    </tr>`).join("");

  tbody.querySelectorAll(".del-link").forEach(a => a.addEventListener("click", async (e) => {
    e.preventDefault();
    DB.run("DELETE FROM categorias WHERE id = ?", [a.dataset.id]);
    await DB.save();
    loadCategorias();
  }));
}

(async () => {
  const session = await guardPage();
  if (!session) return;
  loadCategorias();

  document.getElementById("cat-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const nombre = document.getElementById("c-nombre").value.trim();
    const tipo = document.getElementById("c-tipo").value;
    const color = document.getElementById("c-color").value;
    DB.run("INSERT INTO categorias (nombre, tipo, color) VALUES (?,?,?)", [nombre, tipo, color]);
    await DB.save();
    e.target.reset();
    document.getElementById("c-color").value = "#7ca982";
    loadCategorias();
  });
})();
</script>
</body>
</html>
