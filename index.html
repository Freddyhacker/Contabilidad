<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Libro — Acceso</title>
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16222c">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="prefetch" href="dashboard.html">
</head>
<body>
<script>if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");</script>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="brand"><span class="ledger-mark"></span>Libro</div>

    <div class="tab-row" id="tab-row">
      <div class="tab-btn active" data-tab="login">Iniciar sesión</div>
      <div class="tab-btn" data-tab="register">Crear cuenta</div>
    </div>

    <form id="login-form">
      <label for="l-user">Usuario</label>
      <input id="l-user" required autocomplete="username">
      <label for="l-pass">Contraseña</label>
      <input id="l-pass" type="password" required autocomplete="current-password">
      <div class="checkbox-row">
        <input type="checkbox" id="l-remember"><label for="l-remember" style="margin:0">Recuérdame en este dispositivo</label>
      </div>
      <div class="error-msg" id="l-error"></div>
      <button class="btn btn-block" type="submit">Entrar</button>
    </form>

    <form id="register-form" style="display:none">
      <label for="r-user">Elige un usuario</label>
      <input id="r-user" required autocomplete="username">
      <label for="r-pass">Elige una contraseña</label>
      <input id="r-pass" type="password" required autocomplete="new-password">
      <div class="error-msg" id="r-error">Este primer usuario será el administrador.</div>
      <button class="btn btn-block" type="submit">Crear libro contable</button>
    </form>
  </div>
</div>

<script src="js/idb.js"></script>
<script src="js/crypto.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/theme.js"></script>
<script src="js/config.js"></script>
<script src="js/sheets.js"></script>
<script src="js/sync.js"></script>
<script>
document.querySelectorAll(".tab-btn").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    const isLogin = tab.dataset.tab === "login";
    document.getElementById("login-form").style.display = isLogin ? "block" : "none";
    document.getElementById("register-form").style.display = isLogin ? "none" : "block";
  });
});

// Si ya hay sesión guardada (recuérdame), entra directo
(async () => {
  const session = await Auth.tryAutoLogin();
  if (session) { location.href = "dashboard.html"; return; }
})();

document.getElementById("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const user = document.getElementById("l-user").value.trim();
  const pass = document.getElementById("l-pass").value;
  const remember = document.getElementById("l-remember").checked;
  const errEl = document.getElementById("l-error");
  errEl.textContent = "";
  try {
    const { dataKey, fresh } = await Auth.login(user, pass);
    if (remember) await Auth.rememberDevice(user, dataKey);
    if (fresh && Sheets.isConfigured()) {
      errEl.textContent = "Trayendo tu libro contable…";
      await Sync.pullAll(dataKey);
    }
    location.href = "dashboard.html";
  } catch (err) {
    errEl.textContent = err.message;
  }
});

document.getElementById("register-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const user = document.getElementById("r-user").value.trim();
  const pass = document.getElementById("r-pass").value;
  const errEl = document.getElementById("r-error");
  try {
    if (await Auth.hasAnyUser()) {
      errEl.textContent = "Ya existe un libro contable. Pide al administrador que te agregue como usuario desde Ajustes.";
      return;
    }
    await Auth.registerFirstAdmin(user, pass);
    location.href = "dashboard.html";
  } catch (err) {
    errEl.textContent = err.message;
  }
});
</script>
</body>
</html>
