<script>
const fmt = n => "$" + n.toLocaleString("es-MX", { minimumFractionDigits: 2 });
const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
let openMonth = null;

function renderCategorias() {
  const ym = new Date().toISOString().slice(0, 7);
  const porCat = DB.all(`
    SELECT c.nombre, c.color, SUM(m.monto) as total
    FROM movimientos m JOIN categorias c ON c.id = m.categoria_id
    WHERE m.tipo='gasto' AND substr(m.fecha,1,7)=?
    GROUP BY c.id ORDER BY total DESC`, [ym]);

  document.getElementById("empty").style.display = porCat.length ? "none" : "block";
  const totalGasto = porCat.reduce((sum, r) => sum + r.total, 0);
  document.getElementById("total-gasto").textContent = fmt(totalGasto);
  const base = totalGasto || 1;
  document.getElementById("bar-chart").innerHTML = porCat.map(r => {
    const pct = (r.total / base) * 100;
    return `
    <div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:6px">
        <span>${r.nombre} <span style="color:var(--text-muted)">(${pct.toFixed(1)}%)</span></span><span class="num expense">${fmt(r.total)}</span>
      </div>
      <div style="height:10px;border-radius:4px;background:var(--bg-panel-alt)">
        <div style="height:100%;border-radius:4px;width:${pct}%;background:${r.color}"></div>
      </div>
    </div>`;
  }).join("");
}

// Antes esto hacía 2 consultas POR MES (24 en total) para armar el
// calendario. Ahora es 1 consulta agrupada por mes + 1 para el arrastre
// inicial (2 en total), y con eso se calcula el balance acumulado de los
// 12 meses en JS. El calendario y la gráfica de tendencia reusan el mismo
// resultado en vez de volver a consultar la base cada uno por su lado.
function computeYearData(year) {
  const rows = DB.all(
    `SELECT substr(fecha,1,7) as ym, tipo, SUM(monto) as t
     FROM movimientos WHERE substr(fecha,1,4)=? GROUP BY ym, tipo`,
    [String(year)]
  );
  const byMonth = {};
  rows.forEach(r => {
    const i = parseInt(r.ym.slice(5, 7)) - 1;
    byMonth[i] = byMonth[i] || { inc: 0, exp: 0 };
    byMonth[i][r.tipo === "ingreso" ? "inc" : "exp"] = r.t;
  });

  const antes = DB.all(
    "SELECT tipo, SUM(monto) as t FROM movimientos WHERE fecha < ? GROUP BY tipo",
    [`${year}-01-01`]
  );
  let running = (antes.find(r => r.tipo === "ingreso")?.t || 0) - (antes.find(r => r.tipo === "gasto")?.t || 0);

  return MESES.map((_, i) => {
    const { inc = 0, exp = 0 } = byMonth[i] || {};
    running += inc - exp;
    return { inc, exp, balance: running };
  });
}

function renderMonthGrid(year, yearData) {
  const grid = document.getElementById("month-grid");
  grid.innerHTML = MESES.map((nombre, i) => {
    const { inc, exp, balance } = yearData[i];
    const hasData = inc || exp;
    return `
    <div class="month-box ${openMonth === i ? 'open' : ''}" data-month="${i}">
      <div class="month-box-head">
        <span>${nombre}</span>
        ${hasData ? `<span class="num ${balance >= 0 ? 'income' : 'expense'}" style="font-size:.8rem">${fmt(balance)}</span>` : `<span style="color:var(--text-muted);font-size:.78rem">—</span>`}
      </div>
      <div class="month-box-detail">
        <div class="num income">Ingresos: ${fmt(inc)}</div>
        <div class="num expense">Gastos: ${fmt(exp)}</div>
        <div class="num ${balance >= 0 ? 'income' : 'expense'}">Balance acumulado: ${fmt(balance)}</div>
        <div style="color:var(--text-muted);font-size:.76rem;margin-top:2px">Incluye todo hasta fin de este mes</div>
      </div>
    </div>`;
  }).join("");

  grid.querySelectorAll(".month-box").forEach(box => {
    box.addEventListener("click", () => {
      const m = parseInt(box.dataset.month);
      openMonth = openMonth === m ? null : m;
      renderMonthGrid(year, yearData);
    });
  });
}

function renderTrendChart(yearData) {
  const balances = yearData.map(m => m.balance);
  const w = 600, h = 150, pad = 8;
  const max = Math.max(...balances, 0);
  const min = Math.min(...balances, 0);
  const range = (max - min) || 1;
  const stepX = (w - pad * 2) / (balances.length - 1);
  const y = v => h - pad - ((v - min) / range) * (h - pad * 2);
  const points = balances.map((v, i) => `${pad + i * stepX},${y(v)}`).join(" ");
  const zeroY = y(0);

  document.getElementById("trend-chart").innerHTML = `
    <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:150px;display:block" preserveAspectRatio="none">
      <line x1="${pad}" y1="${zeroY}" x2="${w - pad}" y2="${zeroY}" stroke="var(--border-color)" stroke-dasharray="4 3"/>
      <polyline points="${points}" fill="none" stroke="var(--accent-income)" stroke-width="2"/>
      ${balances.map((v, i) => `<circle cx="${pad + i * stepX}" cy="${y(v)}" r="3" fill="${v >= 0 ? 'var(--accent-income)' : 'var(--accent-expense)'}"/>`).join("")}
    </svg>
    <div style="display:flex;justify-content:space-between;font-size:.68rem;color:var(--text-muted);margin-top:4px">
      ${MESES.map(m => `<span>${m.slice(0, 3)}</span>`).join("")}
    </div>`;
}

function renderYear(year) {
  const yearData = computeYearData(year);
  renderMonthGrid(year, yearData);
  renderTrendChart(yearData);
}

(async () => {
  const session = await guardPage();
  if (!session) return;

  renderCategorias();

  const thisYear = new Date().getFullYear();
  const yearSel = document.getElementById("year-select");
  yearSel.innerHTML = [...Array(11)].map((_, i) => `<option value="${thisYear + i}">${thisYear + i}</option>`).join("");
  yearSel.addEventListener("change", () => {
    openMonth = null;
    renderYear(parseInt(yearSel.value));
  });
  renderYear(thisYear);

  window.addEventListener("libro:synced", () => {
    renderCategorias();
    renderYear(parseInt(yearSel.value));
  });
})();
</script>
