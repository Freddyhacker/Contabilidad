<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Libro — Reportes</title>
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16222c">
<link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar-mount"></nav>
  <main class="main">
    <div class="topbar"><div><h1>Reportes</h1><div class="sub">Gastos por categoría — mes actual</div></div></div>

    <div class="card" style="margin-bottom:var(--space-4)">
      <h3>Gasto por categoría (mes actual)</h3>
      <div class="figure expense" id="total-gasto" style="margin-bottom:var(--space-3)">$0.00</div>
      <div id="bar-chart"></div>
      <div class="empty-state" id="empty" style="display:none">Sin datos suficientes este mes.</div>
    </div>

    <div class="card">
      <div class="topbar" style="margin-bottom:var(--space-3)">
        <h3 style="margin:0">Balance por mes</h3>
        <select id="year-select" style="width:auto;margin:0"></select>
      </div>
      <div class="month-grid" id="month-grid"></div>
    </div>
  </main>
</div>

<script src="js/idb.js"></script>
<script src="js/crypto.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/theme.js"></script>
<script src="js/config.js"></script>
<script src="js/sheets.js"></script>
<script src="js/sync.js"></script>
<script src="js/nav.js"></script>
<script>
const fmt = n => "$" + n.toLocaleString("es-MX", { minimumFractionDigits: 2 });
const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
let openMonth = null;

function renderCategorias() {
  const ym = new Date().toISOString().slice(0, 7);
  const porCat = DB.all(`
    SELECT c.nombre, c.color, SUM(m.monto) as total
    FROM movimientos m JOIN categorias c ON c.id = m.categoria_id
    WHERE m.tipo='gasto' AND substr(m.fecha,1,7)=?
    GROUP BY c.id ORDER BY total DESC`, [ym]);

  document.getElementById("empty").style.display = porCat.length ? "none" : "block";
  const totalGasto = porCat.reduce((sum, r) => sum + r.total, 0);
  document.getElementById("total-gasto").textContent = fmt(totalGasto);
  const base = totalGasto || 1;
  document.getElementById("bar-chart").innerHTML = porCat.map(r => {
    const pct = (r.total / base) * 100;
    return `
    <div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:6px">
        <span>${r.nombre} <span style="color:var(--text-muted)">(${pct.toFixed(1)}%)</span></span><span class="num expense">${fmt(r.total)}</span>
      </div>
      <div style="height:10px;border-radius:4px;background:var(--bg-panel-alt)">
        <div style="height:100%;border-radius:4px;width:${pct}%;background:${r.color}"></div>
      </div>
    </div>`;
  }).join("");
}

function monthBalance(year, monthIdx) {
  const ym = `${year}-${String(monthIdx + 1).padStart(2, "0")}`;
  const rows = DB.all("SELECT tipo, SUM(monto) as t FROM movimientos WHERE substr(fecha,1,7)=? GROUP BY tipo", [ym]);
  const inc = rows.find(r => r.tipo === "ingreso")?.t || 0;
  const exp = rows.find(r => r.tipo === "gasto")?.t || 0;
  return { inc, exp, balance: inc - exp };
}

function renderMonthGrid(year) {
  const grid = document.getElementById("month-grid");
  grid.innerHTML = MESES.map((nombre, i) => {
    const { inc, exp, balance } = monthBalance(year, i);
    const hasData = inc || exp;
    return `
    <div class="month-box ${openMonth === i ? 'open' : ''}" data-month="${i}">
      <div class="month-box-head">
        <span>${nombre}</span>
        ${hasData ? `<span class="num ${balance >= 0 ? 'income' : 'expense'}" style="font-size:.8rem">${fmt(balance)}</span>` : `<span style="color:var(--text-muted);font-size:.78rem">—</span>`}
      </div>
      <div class="month-box-detail">
        <div class="num income">Ingresos: ${fmt(inc)}</div>
        <div class="num expense">Gastos: ${fmt(exp)}</div>
        <div class="num ${balance >= 0 ? 'income' : 'expense'}">Balance: ${fmt(balance)}</div>
      </div>
    </div>`;
  }).join("");

  grid.querySelectorAll(".month-box").forEach(box => {
    box.addEventListener("click", () => {
      const m = parseInt(box.dataset.month);
      openMonth = openMonth === m ? null : m;
      renderMonthGrid(year);
    });
  });
}

(async () => {
  const session = await guardPage();
  if (!session) return;

  renderCategorias();

  const thisYear = new Date().getFullYear();
  const yearSel = document.getElementById("year-select");
  yearSel.innerHTML = [...Array(11)].map((_, i) => `<option value="${thisYear + i}">${thisYear + i}</option>`).join("");
  yearSel.addEventListener("change", () => {
    openMonth = null;
    renderMonthGrid(parseInt(yearSel.value));
  });
  renderMonthGrid(thisYear);

  window.addEventListener("libro:synced", () => {
    renderCategorias();
    renderMonthGrid(parseInt(yearSel.value));
  });
})();
</script>
</body>
</html>
