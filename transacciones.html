<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Libro — Ingresos y gastos</title>
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16222c">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="prefetch" href="dashboard.html">
<link rel="prefetch" href="presupuestos.html">
<link rel="prefetch" href="reportes.html">
<link rel="prefetch" href="categorias.html">
<link rel="prefetch" href="ajustes.html">
</head>
<body>
<script>if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");</script>
<div class="app-shell">
  <nav class="sidebar" id="sidebar-mount">
    <div class="mobile-topbar">
      <button class="brand brand-toggle" id="menu-toggle" aria-label="Abrir menú"><span class="ledger-mark"></span>Libro</button>
      <span class="sync-led" style="width:9px;height:9px;border-radius:50%;background:var(--accent-danger)"></span>
    </div>
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
    <div class="sidebar-inner" id="sidebar-inner">
      <div class="brand"><span class="ledger-mark"></span>Libro<span class="sync-led" style="width:9px;height:9px;border-radius:50%;background:var(--accent-danger);margin-left:2px"></span></div>
      <ul class="nav-list">
      <li><a href="dashboard.html"><span class="ico">◆</span>Dashboard</a></li>
      <li><a href="transacciones.html" class="active"><span class="ico">≡</span>Ingresos y gastos</a></li>
      <li><a href="presupuestos.html"><span class="ico">◧</span>Presupuestos</a></li>
      <li><a href="reportes.html"><span class="ico">▤</span>Reportes</a></li>
      <li><a href="categorias.html"><span class="ico">●</span>Categorías</a></li>
      <li><a href="ajustes.html"><span class="ico">⚙</span>Ajustes</a></li>
      </ul>
      <div class="sidebar-footer">
        <div class="user-row">
          <div class="avatar" id="user-avatar">··</div>
          <div>
            <div style="color:var(--text-primary)" id="user-name"></div>
            <span class="badge" id="user-role">Usuario</span>
          </div>
        </div>
        <a href="#" id="logout-link">Cerrar sesión</a>
      </div>
    </div>
  </nav>
  <main class="main">
    <div class="topbar"><div><h1>Ingresos y gastos</h1><div class="sub">Registra cada movimiento de tu libro contable</div></div></div>

    <div class="card" style="margin-bottom:var(--space-4)">
      <h3>Nuevo movimiento</h3>
      <form id="mov-form">
        <div class="form-row" style="margin-bottom:var(--space-3)">
          <div>
            <label>Tipo</label>
            <div class="tab-row" id="tipo-tabs" style="margin:0">
              <div class="tab-btn active" data-tipo="ingreso">Ingreso</div>
              <div class="tab-btn" data-tipo="gasto">Gasto</div>
            </div>
          </div>
          <div>
            <label for="m-fecha">Fecha</label>
            <input id="m-fecha" type="date" required>
          </div>
          <div>
            <label for="m-monto">Monto</label>
            <input id="m-monto" type="number" step="0.01" min="0" required placeholder="0.00">
          </div>
          <div style="width:200px;flex:0 0 200px">
            <label for="m-cat">Categoría</label>
            <select id="m-cat" style="width:100%"></select>
          </div>
        </div>
        <div>
          <label for="m-nota">Nota (opcional)</label>
          <textarea id="m-nota" rows="2" style="width:100%;min-height:60px;resize:vertical" placeholder="Ej. Renta de julio"></textarea>
        </div>
        <button class="btn" type="submit" style="margin-top:var(--space-2)">Guardar</button>
      </form>
    </div>

    <div class="card">
      <h3>Historial</h3>
      <table id="mov-table">
        <thead><tr><th>Categoría</th><th>Nota</th><th style="text-align:right">Monto</th><th></th></tr></thead>
        <tbody></tbody>
      </table>
      <div class="empty-state" id="empty" style="display:none">Sin movimientos todavía.</div>
    </div>
  </main>
</div>

<script src="js/idb.js"></script>
<script src="js/crypto.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/theme.js"></script>
<script src="js/config.js"></script>
<script src="js/sheets.js"></script>
<script src="js/sync.js"></script>
<script src="js/nav.js"></script>
<script>
const fmt = n => "$" + n.toLocaleString("es-MX", { minimumFractionDigits: 2 });
let tipoActual = "ingreso";

function loadCategorias() {
  const cats = DB.all("SELECT * FROM categorias WHERE tipo = ? ORDER BY nombre", [tipoActual]);
  const sel = document.getElementById("m-cat");
  sel.innerHTML = cats.length
    ? cats.map(c => `<option value="${c.id}">${c.nombre}</option>`).join("")
    : `<option value="">No hay categorías de ${tipoActual}</option>`;
}

function fechaLabel(fecha) {
  const d = new Date(fecha + "T00:00:00");
  const label = d.toLocaleDateString("es-MX", { weekday: "long", day: "numeric", month: "long" });
  return label.charAt(0).toUpperCase() + label.slice(1);
}

function loadMovimientos() {
  const rows = DB.all(`
    SELECT m.*, c.nombre as cat_nombre FROM movimientos m
    LEFT JOIN categorias c ON c.id = m.categoria_id
    ORDER BY m.fecha DESC, m.id DESC`);
  const tbody = document.querySelector("#mov-table tbody");
  document.getElementById("empty").style.display = rows.length ? "none" : "block";

  let html = "";
  let lastFecha = null;
  rows.forEach(r => {
    if (r.fecha !== lastFecha) {
      const dayTotal = rows.filter(x => x.fecha === r.fecha)
        .reduce((sum, x) => sum + (x.tipo === "ingreso" ? x.monto : -x.monto), 0);
      html += `<tr class="date-sep"><td colspan="2">${fechaLabel(r.fecha)}</td>
        <td class="num ${dayTotal >= 0 ? 'income' : 'expense'}" style="text-align:right">${fmt(dayTotal)}</td><td></td></tr>`;
      lastFecha = r.fecha;
    }
    html += `
    <tr>
      <td>${r.cat_nombre || "—"}</td>
      <td>${r.nota || ""}</td>
      <td class="num ${r.tipo === 'ingreso' ? 'income' : 'expense'}" style="text-align:right">
        ${r.tipo === 'ingreso' ? '+' : '-'}${fmt(r.monto)}
      </td>
      <td><a href="#" data-id="${r.id}" class="del-link" style="color:var(--accent-danger)">Eliminar</a></td>
    </tr>`;
  });
  tbody.innerHTML = html;

  tbody.querySelectorAll(".del-link").forEach(a => a.addEventListener("click", async (e) => {
    e.preventDefault();
    DB.run("DELETE FROM movimientos WHERE id = ?", [a.dataset.id]);
    await DB.save();
    loadMovimientos();
  }));
}

(async () => {
  const session = await guardPage();
  if (!session) return;

  document.getElementById("m-fecha").valueAsDate = new Date();
  loadCategorias();
  loadMovimientos();

  document.querySelectorAll("#tipo-tabs .tab-btn").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll("#tipo-tabs .tab-btn").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      tipoActual = tab.dataset.tipo;
      loadCategorias();
    });
  });

  document.getElementById("mov-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const tipo = tipoActual;
    const fecha = document.getElementById("m-fecha").value;
    const monto = parseFloat(document.getElementById("m-monto").value);
    const catId = document.getElementById("m-cat").value || null;
    const nota = document.getElementById("m-nota").value.trim();

    DB.run("INSERT INTO movimientos (fecha, tipo, monto, categoria_id, nota, usuario) VALUES (?,?,?,?,?,?)",
      [fecha, tipo, monto, catId, nota, session.username]);
    await DB.save();

    e.target.reset();
    document.getElementById("m-fecha").valueAsDate = new Date();
    loadMovimientos();
  });

  window.addEventListener("libro:synced", () => {
    loadCategorias();
    loadMovimientos();
  });
})();
</script>
</body>
</html>
